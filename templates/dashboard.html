<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dhan Live Dashboard</title>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
  }

  h2 {
    color: #38bdf8;
  }

  .card {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
  }

  input, button {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: none;
  }

  button {
    cursor: pointer;
    background: #38bdf8;
    color: black;
    font-weight: bold;
  }

  .status { font-weight: bold; }
  .live { color: #22c55e; }
  .offline { color: #ef4444; }
  .error { color: #f97316; }

  pre {
    white-space: pre-wrap;
    font-size: 13px;
  }
</style>
</head>

<body>

<h2>📡 Dhan Live Feed Dashboard</h2>

<!-- INPUT FORM -->
<div class="card">
  <h3>➕ Subscribe / Unsubscribe</h3>

  <input id="exchange" placeholder="Exchange (e.g. 2)" />
  <input id="security" placeholder="Security ID (e.g. 72216)" />
  <input id="type" placeholder="Type (e.g. 17)" />

  <br>

  <button onclick="subscribe()">Subscribe</button>
  <button onclick="unsubscribe()">Unsubscribe</button>

  <pre id="apiResponse">Waiting...</pre>
</div>

<!-- FEEDS -->
<div id="feeds"></div>

<script>
const BASE_HTTP = window.location.origin;
const BASE_WS = BASE_HTTP.replace("http", "ws") + "/ws";


const container = document.getElementById("feeds");

// store sockets
const sockets = {};
let isPageClosing = false;

// ----------------------------
// CREATE CARD
// ----------------------------
function createFeedCard(secId) {
  if (document.getElementById(`card-${secId}`)) return;

  const card = document.createElement("div");
  card.className = "card";
  card.id = `card-${secId}`;

  const title = document.createElement("h3");
  title.textContent = `Security ${secId}`;

  const status = document.createElement("div");
  status.className = "status";
  status.textContent = "Connecting...";

  const data = document.createElement("pre");
  data.textContent = "Waiting...";

  card.appendChild(title);
  card.appendChild(status);
  card.appendChild(data);

  container.appendChild(card);

  connectWS(secId, status, data);
}

// ----------------------------
// CONNECT WS
// ----------------------------
function connectWS(secId, statusEl, dataEl) {

  const wsUrl = `${BASE_WS}/${secId}/quote`;
  let ws = new WebSocket(wsUrl);

  sockets[secId] = ws;

  ws.onopen = () => {
    statusEl.textContent = "🟢 Connected";
    statusEl.className = "status live";
  };

  ws.onmessage = (event) => {
    try {
      const json = JSON.parse(event.data);
      dataEl.textContent = JSON.stringify(json, null, 2);
    } catch {
      dataEl.textContent = "Parse error";
    }
  };

  ws.onerror = () => {
    statusEl.textContent = "🟠 Error";
    statusEl.className = "status error";
  };

  ws.onclose = () => {
    statusEl.textContent = "🔴 Disconnected";
    statusEl.className = "status offline";

    if (!isPageClosing) {
      setTimeout(() => {
        connectWS(secId, statusEl, dataEl);
      }, 2000);
    }
  };
}

// ----------------------------
// SUBSCRIBE
// ----------------------------
async function subscribe() {

  const exchange = Number(document.getElementById("exchange").value);
  const security = document.getElementById("security").value;
  const type = Number(document.getElementById("type").value);

  const payload = {
    symbols: [[exchange, security, type]]
  };

  try {
    const res = await fetch(`${BASE_HTTP}/subscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    document.getElementById("apiResponse").textContent =
      JSON.stringify(data, null, 2);

    if (data.status === "success") {
      createFeedCard(security);
    }

  } catch (err) {
    document.getElementById("apiResponse").textContent = err;
  }
}

// ----------------------------
// UNSUBSCRIBE
// ----------------------------
async function unsubscribe() {

  const exchange = Number(document.getElementById("exchange").value);
  const security = document.getElementById("security").value;
  const type = Number(document.getElementById("type").value);

  const payload = {
    symbols: [[exchange, security, type]]
  };

  try {
    const res = await fetch(`${BASE_HTTP}/unsubscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    document.getElementById("apiResponse").textContent =
      JSON.stringify(data, null, 2);

    if (data.status === "success") {
      removeFeed(security);
    }

  } catch (err) {
    document.getElementById("apiResponse").textContent = err;
  }
}

// ----------------------------
// REMOVE FEED + CLOSE WS
// ----------------------------
function removeFeed(secId) {
  const card = document.getElementById(`card-${secId}`);
  if (card) card.remove();

  if (sockets[secId]) {
    try {
      sockets[secId].close();
      delete sockets[secId];
    } catch {}
  }
}

// ----------------------------
// CLEANUP ON TAB CLOSE
// ----------------------------
window.addEventListener("beforeunload", () => {
  isPageClosing = true;

  Object.values(sockets).forEach(ws => {
    try { ws.close(); } catch {}
  });
});
</script>

</body>
</html>
