<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Alerts Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .table { color: #e2e8f0; }
        .card { background-color: #1e293b; border: none; }
        .form-select, .form-control {
            background-color: #1e293b;
            color: #e2e8f0;
            border: none;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">📊 Trading Alerts Dashboard</h2>

    <!-- Controls -->
    <form method="get" class="row g-3 mb-4" id="filterForm">

        <div class="col-md-4">
            <label class="form-label">Collection</label>
            <select name="collection" class="form-select" onchange="resetLimitAndSubmit()">
                {% for col in collections %}
                    <option value="{{ col }}" {% if col == selected_collection %}selected{% endif %}>
                        {{ col }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">Limit</label>
            <input type="number" name="limit" value="{{ limit }}" class="form-control" id="limitInput">
        </div>

        <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary w-100">Load</button>
        </div>

    </form>

    <!-- Table -->
    <div class="card p-3">
        <table class="table table-striped table-dark table-hover">

            <thead>
                <tr>
                    <th>#</th>
                    <th>Message</th>
                    <th>Time (IST)</th>
                    <th>Symbol</th>
                    <th>Webhook</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                {% for item in data %}
                <tr>
                    <td>{{ item.serial }}</td>
                    <td>{{ item.message }}</td>
                    <td>{{ item.formatted_time }}</td>
                    <td>{{ item.symbol }}</td>
                    <td>{{ item.webhook }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

<!-- 🔥 Script -->
<script>
function resetLimitAndSubmit() {
    document.getElementById("limitInput").value = 100;
    document.getElementById("filterForm").submit();
}

// 🔄 Auto Refresh (AJAX)
setInterval(fetchLatestData, 5000); // every 5 sec

function fetchLatestData() {
    const collection = document.querySelector('select[name="collection"]').value;
    const limit = document.getElementById("limitInput").value;

    fetch(`/?collection=${collection}&limit=${limit}`)
        .then(response => response.text())
        .then(html => {
            // Parse returned HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            // Extract new table body
            const newBody = doc.querySelector("#tableBody");

            if (newBody) {
                document.getElementById("tableBody").innerHTML = newBody.innerHTML;
            }
        })
        .catch(err => console.error("Auto refresh error:", err));
}
</script>

</body>
</html>
